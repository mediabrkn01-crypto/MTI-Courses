<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Broken English</title>
<link id="favicon" rel="icon" type="image/png" href=""/>
<link id="apple-icon" rel="apple-touch-icon" href=""/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#06060F;--s1:#0D0D1C;--s3:#1A1A2E;
  --g1:#ED1F51;--g2:#F03A2A;--g3:#F05825;
  --grad:linear-gradient(135deg,#ED1F51,#F03A2A,#F05825);
  --gradh:linear-gradient(90deg,#ED1F51,#F03A2A,#F05825);
  --glass:rgba(255,255,255,0.06);--glass-border:rgba(255,255,255,0.12);
  --border:rgba(255,255,255,0.07);--border-glow:rgba(255,45,120,0.3);
  --text:#F4F2FF;--muted:#6B6B90;--muted2:#9898B8;
  --r:16px;--r2:22px;--sb:250px;
  --brand:#ED1F51;--brand-2:#F05825;
  --brand-grad:linear-gradient(135deg,#ED1F51,#F03A2A,#F05825);
}
html{font-size:16px}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:4px}
/* BOOT */
#boot-screen{position:fixed;inset:0;z-index:99999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;transition:opacity .5s}
#boot-screen.hidden{opacity:0;pointer-events:none}
.boot-logo{display:flex;align-items:center;justify-content:center;margin-bottom:20px}
@keyframes bootPulse{0%,100%{box-shadow:0 0 40px rgba(255,45,120,.4),0 0 80px rgba(255,45,120,.15)}50%{box-shadow:0 0 80px rgba(255,45,120,.7),0 0 160px rgba(255,45,120,.3)}}
.boot-title{font-family:'Montserrat',sans-serif;font-weight:800;font-size:28px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.boot-sub{font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;letter-spacing:.12em;text-transform:uppercase;margin-bottom:48px}
.boot-bar-wrap{width:260px;margin-bottom:12px}
.boot-bar{height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.boot-fill{height:100%;width:0%;background:var(--gradh);border-radius:2px;transition:width .08s linear}
.boot-status{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;letter-spacing:.06em;text-align:center;min-height:16px;margin-bottom:4px}
.boot-pct{font-size:11px;color:var(--g1);font-family:'JetBrains Mono',monospace;text-align:center}
/* SCREEN WARN */
#screen-warn{display:none;position:fixed;inset:0;z-index:9999;background:rgba(6,6,15,.96);backdrop-filter:blur(20px);align-items:center;justify-content:center;flex-direction:column;gap:16px}
#screen-warn.show{display:flex}
/* SIDEBAR */
#sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sb);min-width:var(--sb);background:rgba(13,13,28,0.9);border-right:1px solid rgba(255,255,255,.06);backdrop-filter:blur(30px) saturate(160%);-webkit-backdrop-filter:blur(30px) saturate(160%);display:flex;flex-direction:column;z-index:100;transition:transform .3s cubic-bezier(.4,0,.2,1);overflow-y:auto;overflow-x:hidden}
@media(max-width:767px){#sidebar{transform:translateX(-100%)}#sidebar.open{transform:translateX(0)}}
@media(min-width:768px){#sidebar{transform:translateX(0)!important}}
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:49}
@media(max-width:767px){#sidebar.open~#sidebar-overlay,#sidebar-overlay.open{display:block}}
.sb-brand{padding:18px 16px 14px;border-bottom:1px solid var(--border);flex-shrink:0;min-width:0}
.sb-logo{display:flex;align-items:center;gap:10px;min-width:0;overflow:hidden}
.sb-mark{width:34px;height:34px;border-radius:9px;background:var(--grad);display:flex;align-items:center;justify-content:center;font-family:'Montserrat',sans-serif;font-weight:800;font-size:14px;color:#fff;box-shadow:0 2px 12px rgba(255,45,120,.4);flex-shrink:0}
.sb-name{font-family:'Montserrat',sans-serif;font-weight:800;font-size:14px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-tag{font-size:9px;color:var(--muted);font-family:'JetBrains Mono',monospace;letter-spacing:.08em;margin-top:1px}
.sb-nav{flex:1;overflow-y:auto;padding:8px 0;min-width:0}
.sb-nav::-webkit-scrollbar{display:none}
.sb-sec{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);padding:12px 14px 4px;white-space:nowrap}
/* ══ SIDEBAR ITEMS ══ */
.sb-item{display:flex;align-items:center;gap:10px;padding:10px 12px 10px 14px;cursor:pointer;font-size:13px;color:var(--muted);transition:background .15s,color .15s;margin:1px 6px;border-radius:8px;user-select:none;position:relative;min-width:0}
.sb-item:hover{color:var(--text);background:rgba(255,255,255,.05)}
.sb-item.active{color:var(--text);background:rgba(255,45,120,.1);box-shadow:inset 0 0 0 1px rgba(255,45,120,.15)}
.sb-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:60%;background:var(--gradh);border-radius:0 2px 2px 0}
.sb-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0;line-height:1}
.sb-lbl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px}
.sb-bdg{background:var(--grad);border-radius:10px;padding:1px 7px;font-size:10px;font-weight:600;color:#fff;font-family:'JetBrains Mono',monospace;flex-shrink:0}
.sb-foot{padding:12px 14px;border-top:1px solid var(--border);flex-shrink:0}
.sb-user{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:10px;cursor:pointer;transition:background .15s;background:rgba(255,255,255,.04);border:1px solid var(--border);min-width:0}
.sb-user:hover{background:rgba(255,255,255,.07)}
.sb-uname{font-size:12px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.sb-out{color:var(--muted);font-size:16px;cursor:pointer;padding:2px 4px;transition:color .15s;flex-shrink:0}
.sb-out:hover{color:var(--g1)}
/* ══ VOICE WIDGET ══ */
.sb-voice{margin:10px 12px;background:rgba(255,45,120,.08);border:1px solid rgba(255,45,120,.15);border-radius:10px;padding:9px 11px;display:flex;align-items:center;gap:8px;min-width:0;overflow:hidden}
.sb-voice-info .sv-label{font-size:9px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.07em;display:block}
.sb-voice-info .sv-val{font-family:'Montserrat',sans-serif;font-weight:800;font-size:16px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
/* ══ LESSON PANEL ══ */
.mp-item{display:block;cursor:pointer;transition:background .15s;border-bottom:1px solid rgba(255,255,255,.06)}
.mp-item:hover{background:rgba(255,255,255,.04)}
.mp-item.mp-active{background:rgba(255,45,120,.07)}

.nav-link{display:flex;align-items:center;gap:10px;padding:10px 14px 10px 16px;cursor:pointer;font-size:13px;color:var(--muted);transition:all .15s;position:relative;user-select:none;margin:1px 6px;border-radius:8px;border:none;background:none;text-align:left;width:calc(100% - 12px)}
.nav-link:hover{color:var(--text);background:rgba(255,255,255,.05);transform:scale(1.04) translateX(3px)}
.nav-link.active{color:var(--text);background:rgba(255,45,120,.1);box-shadow:inset 0 0 0 1px rgba(255,45,120,.15)}
.nav-link.active::before{content:'';position:absolute;left:-6px;top:50%;transform:translateY(-50%);width:3px;height:60%;background:var(--gradh);border-radius:0 2px 2px 0}
.nav-link svg{width:18px;height:18px;flex-shrink:0}
.sb-foot{padding:12px 14px;border-top:1px solid var(--border);flex-shrink:0}
.sb-user{display:flex;align-items:center;gap:9px;padding:8px;border-radius:10px;cursor:pointer;transition:background .15s;background:rgba(255,255,255,.04);border:1px solid var(--border)}
.sb-user:hover{background:rgba(255,255,255,.07)}
/* MAIN */
#main-content{min-height:100vh;display:flex;flex-direction:column;position:relative;z-index:1}
@media(min-width:768px){#main-content{margin-left:var(--sb)}}
/* TOP BAR */
.top-bar{background:rgba(13,13,28,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.06);box-shadow:0 2px 12px rgba(0,0,0,.3);position:sticky;top:0;z-index:30;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.admin-top-bar{background:rgba(13,13,28,.92);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border-bottom:1px solid rgba(255,255,255,.08);box-shadow:0 2px 12px rgba(0,0,0,.3);position:sticky;top:0;z-index:30;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.stats-strip{background:rgba(255,255,255,0.03);border-bottom:1px solid rgba(255,255,255,0.06)}
/* PROG BAR */
.prog-bar{height:4px;border-radius:99px;overflow:hidden;background:rgba(255,255,255,0.08)}
.prog-fill{height:100%;border-radius:99px;background:var(--gradh);transition:width .6s ease}
/* DASHBOARD */
.dashboard-layout{display:flex;flex:1;min-height:0}
.courses-col{flex:1;min-width:0;overflow-y:auto;padding:16px}
.lesson-panel-wrap{width:340px;flex-shrink:0;overflow-y:auto;padding:16px;border-left:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,0.02)}
@media(max-width:1023px){.dashboard-layout{flex-direction:column}.lesson-panel-wrap{width:100%;border-left:none;border-top:1px solid rgba(255,255,255,.06)}}
/* GLASS */
.lg{background:rgba(255,255,255,.06);backdrop-filter:blur(28px) saturate(160%);-webkit-backdrop-filter:blur(28px) saturate(160%);border-radius:20px;border:1px solid rgba(255,255,255,.1);box-shadow:inset 0 1px 0 rgba(255,255,255,.12),0 8px 32px rgba(0,0,0,.35);position:relative;overflow:hidden;transition:transform .2s cubic-bezier(.34,1.3,.64,1),box-shadow .2s}
.lg::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,.08) 0%,transparent 100%);border-radius:inherit;pointer-events:none;z-index:0}
.lg>*{position:relative;z-index:1}
.lg:hover{transform:translateY(-2px);box-shadow:inset 0 1px 0 rgba(255,255,255,.18),0 16px 48px rgba(0,0,0,.45)}
.card{background:rgba(255,255,255,.06);backdrop-filter:blur(28px) saturate(160%);-webkit-backdrop-filter:blur(28px) saturate(160%);border-radius:20px;border:1px solid rgba(255,255,255,.1);box-shadow:inset 0 1px 0 rgba(255,255,255,.12),0 8px 32px rgba(0,0,0,.35);position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,.08) 0%,transparent 100%);border-radius:inherit;pointer-events:none;z-index:0}
.card>*{position:relative;z-index:1}
.glass-white{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:16px;backdrop-filter:blur(20px);box-shadow:inset 0 1px 0 rgba(255,255,255,.15),0 4px 16px rgba(0,0,0,.3)}
/* MODULE LIST */
.module-list-container{background:rgba(255,255,255,.05);backdrop-filter:blur(28px);border:1px solid rgba(255,255,255,.1);border-radius:20px;overflow:visible;box-shadow:inset 0 1px 0 rgba(255,255,255,.1),0 8px 32px rgba(0,0,0,.35);position:relative}
.module-list-container::before{content:'';position:absolute;top:0;left:0;right:0;height:40%;background:linear-gradient(180deg,rgba(255,255,255,.07) 0%,transparent 100%);border-radius:20px 20px 0 0;pointer-events:none;z-index:0}
.module-list-header{padding:14px 18px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1}
/* MODULE BANNER */
.module-banner{position:relative;overflow:hidden;border-radius:14px;height:80px;cursor:pointer;margin-bottom:7px;border:1px solid rgba(255,255,255,.12);box-shadow:inset 0 1px 0 rgba(255,255,255,.18),0 4px 16px rgba(0,0,0,.4);transition:transform .22s cubic-bezier(.34,1.2,.64,1),box-shadow .22s,border-color .2s}
.module-banner:hover{transform:scale(1.022) translateY(-2px);box-shadow:inset 0 1px 0 rgba(255,255,255,.25),0 14px 40px rgba(0,0,0,.55)}
.module-banner.locked{cursor:not-allowed;opacity:.35}
.module-banner.locked:hover{transform:none}
.module-banner.active-banner{border-color:var(--g1)!important;box-shadow:inset 0 1px 0 rgba(255,255,255,.25),0 0 0 1px var(--g1),0 0 0 4px rgba(255,45,120,.15),0 12px 36px rgba(0,0,0,.5)!important}
.module-banner-bg{position:absolute;inset:0;background-size:cover;background-position:center;transition:transform .4s ease}
.module-banner:hover .module-banner-bg{transform:scale(1.04)}
.module-banner-overlay{position:absolute;inset:0;background:linear-gradient(to right,rgba(0,0,0,.88) 0%,rgba(0,0,0,.55) 55%,rgba(0,0,0,.18) 100%)}
.module-banner::after{content:'';position:absolute;top:0;left:0;right:0;height:48%;background:linear-gradient(180deg,rgba(255,255,255,.08) 0%,transparent 100%);pointer-events:none;z-index:3;border-radius:14px 14px 0 0}
.module-banner-content{position:relative;z-index:4;height:100%;display:flex;align-items:center;padding:0 16px;gap:12px}
.module-banner-icon{width:36px;height:36px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.1);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.2)}
.module-banner-text{flex:1;min-width:0}
.module-banner-day{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--g3);line-height:1;font-family:'JetBrains Mono',monospace}
.module-banner-title{font-size:13px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;font-family:'Montserrat',sans-serif}
.module-banner-status{font-size:10px;font-weight:600;margin-top:3px}
/* PANEL CARD */
.panel-card{background:rgba(255,255,255,.07);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.14);border-radius:14px;box-shadow:inset 0 1px 0 rgba(255,255,255,.14),0 4px 16px rgba(0,0,0,.25);color:var(--text);position:relative;overflow:hidden;transition:transform .2s cubic-bezier(.34,1.3,.64,1),box-shadow .2s}
.panel-card::before{content:'';position:absolute;top:0;left:0;right:0;height:48%;background:linear-gradient(180deg,rgba(255,255,255,.08) 0%,transparent 100%);pointer-events:none}
.panel-card>*{position:relative;z-index:1}
.panel-card:hover{transform:scale(1.02) translateY(-1px)}
/* BUTTONS */
.btn-primary{background:var(--grad);border:1px solid rgba(255,255,255,.2);border-radius:12px;padding:14px 20px;font-size:15px;font-weight:700;color:#fff;cursor:pointer;width:100%;box-shadow:0 4px 24px rgba(255,45,120,.4),inset 0 1px 0 rgba(255,255,255,.2);transition:all .18s;position:relative;overflow:hidden;font-family:'Montserrat',sans-serif;letter-spacing:.02em}
.btn-primary:hover{opacity:.9;transform:scale(1.03) translateY(-1px);box-shadow:0 8px 32px rgba(255,45,120,.55)}
.btn-primary::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);transition:left .4s}
.btn-primary:hover::before{left:100%}
.btn-ghost{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);border-radius:12px;padding:12px 20px;font-size:14px;font-weight:600;color:rgba(255,255,255,.82);cursor:pointer;backdrop-filter:blur(12px);box-shadow:inset 0 1px 0 rgba(255,255,255,.12),0 2px 8px rgba(0,0,0,.2);transition:all .18s}
.btn-ghost:hover{background:rgba(255,255,255,.12);color:#fff;border-color:rgba(255,255,255,.22);transform:scale(1.03) translateY(-1px)}
/* TABS */
.tab-glass{border-radius:10px;padding:8px 18px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .2s;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);color:var(--muted);backdrop-filter:blur(12px)}
.tab-glass.active{background:var(--grad);color:#fff;border-color:rgba(255,255,255,.18);box-shadow:0 4px 16px rgba(255,45,120,.35)}
.tab-glass:not(.active):hover{background:rgba(255,255,255,.12);color:var(--text);transform:scale(1.05)}
.tab-glass.active:hover{transform:scale(1.05)}
/* INPUTS */
.glass-input{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:13px 15px;font-size:14px;color:var(--text);font-family:'Inter',sans-serif;outline:none;backdrop-filter:blur(10px);transition:border-color .2s,box-shadow .2s}
.glass-input:focus{border-color:var(--g1);box-shadow:0 0 0 3px rgba(255,45,120,.12),inset 0 1px 0 rgba(255,255,255,.08)}
.glass-input::placeholder{color:var(--muted)}
.glass-input-white{background:rgba(255,255,255,.94);border:1px solid rgba(255,255,255,.95);color:#1c1c1e;padding:12px 16px;border-radius:10px;width:100%;font-size:14px;outline:none}
/* QUIZ OPTIONS */
.quiz-opt{width:100%;display:flex;align-items:center;gap:12px;padding:14px 18px;border-radius:12px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);text-align:left;font-size:14px;color:rgba(255,255,255,.88);transition:all .18s;cursor:pointer;backdrop-filter:blur(12px)}
.quiz-opt:hover{background:rgba(255,255,255,.12);border-color:rgba(255,45,120,.3);transform:scale(1.02) translateX(5px)}
.quiz-opt.correct{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.3);color:#fff}
.quiz-opt.wrong{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.2);color:rgba(255,255,255,.45)}
.quiz-opt.dim{opacity:.28}
/* ADMIN TABLE */
.admin-table{width:100%;border-collapse:collapse}
.admin-table thead tr{background:rgba(255,255,255,.04);border-bottom:1px solid rgba(255,255,255,.08)}
.admin-table th{padding:12px 16px;text-align:left;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.admin-table th.center{text-align:center}.admin-table th.right{text-align:right}
.admin-table tbody tr{border-bottom:1px solid rgba(255,255,255,.05);transition:all .18s cubic-bezier(.34,1.3,.64,1)}
.admin-table tbody tr:hover{background:rgba(255,255,255,.04);transform:scale(1.01) translateX(3px)}
.admin-table td{padding:14px 16px;font-size:14px;color:rgba(255,255,255,.82)}
.admin-table td.center{text-align:center}.admin-table td.right{text-align:right}
/* PILLS */
.pill{display:inline-flex;align-items:center;border-radius:99px;padding:3px 10px;font-size:11px;font-weight:700;backdrop-filter:blur(8px)}
.pill-white{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.75)}
.pill-green{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);color:#4ade80}
.pill-grey{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:var(--muted)}
.pill-orange{background:rgba(255,45,120,.12);border:1px solid rgba(255,45,120,.25);color:var(--g3)}
.pill-red{background:rgba(237,31,81,.14);border:1px solid rgba(237,31,81,.28);color:var(--g1)}
.pill-yellow{background:rgba(234,179,8,.1);border:1px solid rgba(234,179,8,.2);color:#fbbf24}
/* CLASS CARDS */
.class-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:14px;position:relative;overflow:hidden;box-shadow:inset 0 1px 0 rgba(255,255,255,.1),0 3px 12px rgba(0,0,0,.3);transition:transform .2s cubic-bezier(.34,1.3,.64,1),box-shadow .2s}
.class-card::before{content:'';position:absolute;top:0;left:0;right:0;height:45%;background:linear-gradient(180deg,rgba(255,255,255,.08) 0%,transparent 100%);pointer-events:none}
.class-card>*{position:relative;z-index:1}
.class-card:hover{transform:scale(1.06) translateY(-3px);box-shadow:inset 0 1px 0 rgba(255,255,255,.2),0 12px 32px rgba(0,0,0,.45);z-index:2;position:relative}
.class-card.unlocked{border-color:rgba(255,45,120,.25);background:rgba(255,45,120,.07)}
.class-card.vid-locked{border-color:rgba(255,255,255,.15);background:rgba(255,255,255,.04)}
.class-card.quiz-locked{border-color:rgba(255,255,255,.12);background:rgba(255,255,255,.03)}
/* TOGGLE */

<script>
(function(){
  // 1. Block right-click everywhere
  document.addEventListener('contextmenu',e=>{e.preventDefault();return false;});

  // 2. Block screenshot/recording keyboard shortcuts
  document.addEventListener('keydown',e=>{
    // Block PrintScreen, Cmd+Shift+3/4/5 (Mac), Win+PrintScreen
    if(e.key==='PrintScreen'||
       (e.metaKey&&e.shiftKey&&['3','4','5','s','S'].includes(e.key))||
       (e.ctrlKey&&e.shiftKey&&['s','S'].includes(e.key))){
      e.preventDefault();
      e.stopPropagation();
      return false;
    }
    // Block F12, Ctrl+U (view source), Ctrl+S (save), Ctrl+Shift+I
    if(e.key==='F12'||(e.ctrlKey&&['u','s','U','S'].includes(e.key))||
       (e.ctrlKey&&e.shiftKey&&['i','I'].includes(e.key))){
      e.preventDefault();
    }
  },true);

  // 3. Block text selection on video areas
  document.addEventListener('selectstart',e=>{
    if(e.target.closest('#player-wrapper')||e.target.closest('#yt-player')){
      e.preventDefault();
    }
  });

  // 4. Blur video when tab is hidden (blocks most screen recorders that need focus)
  document.addEventListener('visibilitychange',()=>{
    if(document.hidden){
      document.body.classList.add('tab-hidden');
    } else {
      document.body.classList.remove('tab-hidden');
    }
  });

  // 5. Detect picture-in-picture (common screen recording method)
  document.addEventListener('enterpictureinpicture',e=>{
    e.target.pause?.();
    e.target.requestFullscreen?.().catch(()=>{});
  },true);

  // 6. Block drag of video/images
  document.addEventListener('dragstart',e=>{
    if(e.target.tagName==='VIDEO'||e.target.tagName==='IMG'||e.target.tagName==='IFRAME'){
      e.preventDefault();
    }
  });

  // 7. DevTools detection — blur content if opened
  let devOpen=false;
  const threshold=160;
  setInterval(()=>{
    const w=window.outerWidth-window.innerWidth>threshold||window.outerHeight-window.innerHeight>threshold;
    if(w&&!devOpen){devOpen=true;document.body.classList.add('tab-hidden');}
    if(!w&&devOpen){devOpen=false;document.body.classList.remove('tab-hidden');}
  },1000);
})();
</script>

// Apply brand colors, favicon and title at runtime
(function applyFavicon(){
  // Set favicon dynamically from URL
  var furl=(typeof FAVICON_URL!=="undefined"&&FAVICON_URL&&!FAVICON_URL.includes("YOUR_"))?FAVICON_URL:null;
  if(furl){
    var existing=document.querySelector("link[rel*='icon']");
    if(existing){existing.href=furl;}
    else{var lnk=document.createElement("link");lnk.rel="icon";lnk.type="image/png";lnk.href=furl;document.head.appendChild(lnk);}
  }
})();

(function applyBrandColors(){
  const r = document.documentElement.style;
  r.setProperty('--brand',  COLOR_BRAND);
  r.setProperty('--brand-2', COLOR_BRAND2);
  r.setProperty('--brand-grad', `linear-gradient(${COLOR_GRAD_DIR},${COLOR_BRAND},${COLOR_BRAND2})`);

  // Update browser tab title
  document.title = SITE_NAME;

  // Apply favicon + logo
  const faviconSrc = FAVICON_BASE64 || getLogoSrc();
  let favicon = document.querySelector("link[rel~='icon']");
  if(!favicon){ favicon = document.createElement('link'); favicon.rel='icon'; document.head.appendChild(favicon); }
  favicon.href = faviconSrc;

  // Apply apple touch icon (for iOS home screen)
  let touchIcon = document.querySelector("link[rel='apple-touch-icon']");
  if(!touchIcon){ touchIcon = document.createElement('link'); touchIcon.rel='apple-touch-icon'; document.head.appendChild(touchIcon); }
  touchIcon.href = getLogoSrc();
})();

(function(){
  // Remove ALL be_os keys that conflict (non-bep_ prefixed)
  var keysToRemove=[];
  for(var ki=0;ki<localStorage.length;ki++){
    var kk=localStorage.key(ki);

})();

// ── BOOT SCREEN ──────────────────────────────────────────────────────────────
(function runBoot(){
  // Update logo inside boot screen
  const bootLogoImg = document.getElementById('boot-logo-img');
  const logoImg = getLogoSrc();
  if(logoImg && bootLogoImg){
    bootLogoImg.src = logoImg;
    bootLogoImg.style.display = 'inline-block';
  } else {
    var bt = document.getElementById('boot-logo-text');
    if(bt) bt.style.display = 'block';
  }
  // boot-site-name element removed

  const steps = [
    'Initialising Voice OS...',
    'Loading accent engine...',
    'Calibrating phoneme matrix...',
    'Preparing your journey...',
    'Welcome.'
  ];
  const pcts = [0,25,55,80,100];
  let i = 0;

  function step(){
    if(i >= steps.length){
      setTimeout(()=>{
        const boot = document.getElementById('boot-screen');
        boot.classList.add('hidden');
        setTimeout(()=>{ boot.style.display='none'; },500);
      }, 300);
      return;
    }
    document.getElementById('boot-fill').style.width = pcts[i]+'%';
    document.getElementById('boot-pct').textContent = pcts[i]+'%';
    document.getElementById('boot-status').textContent = steps[i];
    i++;
    setTimeout(step, 550 + Math.random()*250);
  }
  setTimeout(step, 300);
})();

function getStudentStats(studentId){
  const progress = loadProgress(studentId);
  const completed = progress.size;
  const quizzes = ALL_LESSONS.filter(l=>progress.has(l.id) && hasRealQuiz(l)).length;
  return {completed, quizzes};
}

function renderAchievements(){
  if(!currentSession||currentSession.role!=='student'){navigate('login');return;}
  const student = loadStudents()[currentSession.studentId];
  if(!student){currentSession=null;navigate('login');return;}
  const stats = getStudentStats(student.id);
  const earned = BADGES.filter(b=>b.check(stats));
  const app = document.getElementById('app');
  app.innerHTML = sidebarHtml("achievements")+`
  <div id="main-content">
    ${topBarHtml(student)}
    ${mobileNavHtml("achievements")}
    <div style="padding:20px 16px 60px;max-width:960px">
      <h2 style="font-size:22px;font-weight:800;color:#fff;margin-bottom:4px;font-family:'Montserrat',sans-serif">Achievements</h2>
      <p style="font-size:13px;color:var(--muted);margin-bottom:24px">${earned.length} of ${BADGES.length} unlocked</p>
      <div class="ach-grid">
        ${BADGES.map(b=>{
          const got = b.check(stats);
          return`<div class="ach-card ${got?'earned':'locked-ach'}">
            <span class="ach-emoji">${b.emoji}</span>
            <div class="ach-name">${b.name}</div>
            <div class="ach-desc">${b.desc}</div>
            ${got?`<div class="ach-tag">Unlocked ✓</div>`:`<div class="ach-tag" style="background:rgba(255,255,255,.05);color:rgba(255,255,255,.25)">Locked</div>`}
          </div>`;
        }).join('')}
      </div>
    </div>
  </div>`;
}

function journeyStripHtml(studentId){
  const progress = loadProgress(studentId);
  const dots = ALL_LESSONS.map((l,i)=>{
    const done = progress.has(l.id);
    const unlocked = isUnlocked(l);
    const isCurrent = !done && unlocked;
    const cls = done?'done':isCurrent?'current':'locked';
    const isLast = i===ALL_LESSONS.length-1;
    return`<div class="jd-item" onclick="${unlocked?`selectLesson('${l.id}');navigate('dashboard')`:''}">
      <div class="jd-dot ${cls}">${done?'✓':l.order}</div>
      <div class="jd-num">D${l.order}</div>
    </div>${!isLast?`<div class="jd-line ${done?'done':''}"></div>`:''}`;
  }).join('');
  const completed = progress.size;
  const pct = Math.round(completed/ALL_LESSONS.length*100);
  return`<div class="journey-strip">
    <div class="journey-header">
      <span class="journey-title">Your Journey</span>
      <span style="font-size:11px;font-family:monospace;color:var(--brand-2)">${completed}/${ALL_LESSONS.length} · ${pct}%</span>
    </div>
    <div class="journey-dots">${dots}</div>
  </div>`;
}

function statsStripHtml(studentId){
  const progress = loadProgress(studentId);
  const completed = progress.size;
  const quizzes = ALL_LESSONS.filter(l=>progress.has(l.id)&&hasRealQuiz(l)).length;
  const total = ALL_LESSONS.length;
  const pct = Math.round(completed/total*100);
  const earnedBadges = BADGES.filter(b=>b.check({completed,quizzes})).length;
  return`<div class="stats-grid">
    <div class="stat-card">
      <div class="stat-icon">📚</div>
      <div class="stat-val">${completed}</div>
      <div class="stat-label">Classes Done</div>
    </div>

      <div class="stat-icon">📝</div>

      <div class="stat-label">Quizzes Passed</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">📊</div>

      <div class="stat-val">${earnedBadges}</div>

    </div>

}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
// 3-per-day drip unlock logic:
function getUnlockedSet(student){
  const explicit=new Set(student.accessList||[]);
  const done=new Set(
    ALL_LESSONS
      .filter(l=>loadProgress(student.id).has(l.id))
      .map(l=>l.order)
  );
  const unlocked=new Set(explicit);
  unlocked.add(1);

  const todayStr=today.toISOString().slice(0,10);
  const key="brokeneng_drip_"+student.id+"_"+todayStr;
  let dripped;
  try{dripped=new Set(JSON.parse(localStorage.getItem(key)||"[]"));}
  catch{dripped=new Set();}

  for(let i=1;i<ALL_LESSONS.length;i++){
    const lesson=ALL_LESSONS[i];
    const prev=ALL_LESSONS[i-1];
    if(!done.has(prev.order)) break; 
    if(unlocked.has(lesson.order)) continue; 
    if(dripped.has(lesson.order)){unlocked.add(lesson.order);continue;}
    if(dripped.size<DAILY_DRIP){
      dripped.add(lesson.order);
      unlocked.add(lesson.order);
      localStorage.setItem(key,JSON.stringify([...dripped]));
    } else {
      break; 
    }
  }
  return unlocked;
}

function isUnlocked(lesson){
  if(adminUnlockAll)return true;
  if(currentSession?.role==="student"){
    const s=loadStudents()[currentSession.studentId];
    if(!s)return false;
    const{expired}=getValidity(s);
    if(expired)return false;
    return getUnlockedSet(s).has(lesson.order);
  }
  return false;
}
function isVideoAccessible(lesson){
  if(!isUnlocked(lesson))return false;
  if(currentSession?.role==="student"){
    const locked=getLockedVideos(currentSession.studentId);
    if(locked.includes(lesson.order))return false;
  }
  return true;
}

  const loginBtn=document.getElementById("login-btn-main");
  if(loginBtn){loginBtn.textContent="Signing in...";loginBtn.disabled=true;}

  // 1. Try Supabase first (works across devices)
  var sbStudent=null;
  if(typeof _sb!=="undefined"){
    try{
      const{data,error}=await _sb.from("students")
        .select("*")
        .eq("email",email)
        .single();
      if(!error&&data){
        sbStudent=data;
        // Sync to localStorage for offline use
        const localStudents=loadStudents();
        localStudents[data.id]={
          id:data.id,
          name:data.name,
          email:data.email,
          password:data.password_hash,
          validUntil:data.valid_until||null,
          accessList:data.access_list||[1],
          createdAt:data.created_at||new Date().toISOString(),
          completedAt:data.completed_at||null
        };
        localStorage.setItem("brokeneng_students",JSON.stringify(localStudents));
      }
    }catch(e){console.warn("Supabase login lookup failed:",e);}
  }

  // 2. Fall back to localStorage
  const students=loadStudents();
  const allStudents=Object.values(students);
  const byEmail=allStudents.find(s=>s.email&&s.email.toLowerCase()===email);

  if(loginBtn){loginBtn.textContent="Sign In";loginBtn.disabled=false;}

  if(!byEmail){
    errEl.textContent="No account found with that email address.";
    errEl.style.display="block";
    return;
  }

  if(byEmail.password!==pass){
    errEl.textContent="Incorrect password.";
    errEl.style.display="block";
    return;
  }

  const{expired}=getValidity(byEmail);
  if(expired){
    errEl.textContent="Your course access has expired. Please contact your admin.";
    errEl.style.display="block";
    return;
  }

  errEl.style.display="none";
  currentSession={role:"student",studentId:byEmail.id};
  // Sync progress from Supabase in background
  sbLoadProgress(byEmail.id);
  sbLoadVideos(); // sync video metadata across devices
  try{
    navigate("dashboard");
  }catch(e){
    errEl.textContent="Dashboard error: "+e.message;
    errEl.style.display="block";
    console.error(e);
  }
};

function loadVideos(){try{return JSON.parse(localStorage.getItem("brokeneng_videos")||"{}");}catch{return{};}}
function saveVideos(v){
  localStorage.setItem("brokeneng_videos",JSON.stringify(v));
  if(typeof _sb!=="undefined") sbSaveVideos(v);
}
function getLockedVideos(sid){try{return JSON.parse(localStorage.getItem("brokeneng_locked_"+sid)||"[]");}catch{return[];}}
function saveLockedVideos(sid,arr){localStorage.setItem("brokeneng_locked_"+sid,JSON.stringify(arr));}
function getLockedQuizzes(sid){try{return JSON.parse(localStorage.getItem("brokeneng_quizlock_"+sid)||"[]");}catch{return[];}}
function saveLockedQuizzes(sid,arr){localStorage.setItem("brokeneng_quizlock_"+sid,JSON.stringify(arr));}
function isQuizAccessible(lesson){
  if(!hasRealQuiz(lesson))return false;
  if(!isCompleted(lesson.id))return false; 
  if(currentSession?.role==="student"){
    const locked=getLockedQuizzes(currentSession.studentId);
    if(locked.includes(lesson.order))return false;
  }
  return true;
}

function getValidity(student){
  if(!student.validUntil)return{validUntil:null,expired:false};
  const d=new Date(student.validUntil); d.setHours(23,59,59,0);
  if(student.completedAt)return{validUntil:d,expired:false};
  return{validUntil:d,expired:today>d};
}
function validityBadge(student){
  const{validUntil,expired}=getValidity(student);
  if(!validUntil)return`<span style="border-radius:99px;padding:2px 8px;font-size:10px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:var(--muted)">No expiry</span>`;
  if(expired)return`<span style="border-radius:99px;padding:2px 8px;font-size:10px;font-weight:600;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.28);color:#fca5a5">Expired ${validUntil.toLocaleDateString()}</span>`;
  const days=Math.ceil((validUntil-today)/86400000);
  return`<span style="border-radius:99px;padding:2px 8px;font-size:10px;font-weight:600;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);color:#4ade80">${days}d left — ${validUntil.toLocaleDateString()}</span>`;
}

            const cardCls=granted?(vidLk?'class-card vid-locked':qLk?'class-card quiz-locked':'class-card unlocked'):'class-card';
            const labelCol=granted?(vidLk?'#facc15':qLk?'#c4b5fd':'#4ade80'):'rgba(255,255,255,0.35)';
            return`<div class="${cardCls}">
              <p style="font-weight:700;font-size:12px;color:${labelCol};margin-bottom:2px">Class ${l.order}</p>

                  ${granted?'✓ Unlocked':'🔒 Locked'}
                </button>
                ${granted?`<button onclick="toggleVideoLock('${id}',${l.order})" style="padding:5px;border-radius:8px;font-size:10px;font-weight:700;cursor:pointer;border:1px solid;transition:all .15s;${vidLk?'background:rgba(234,179,8,0.14);border-color:rgba(234,179,8,0.32);color:#facc15':'background:rgba(255,255,255,0.07);border-color:rgba(255,255,255,0.15);color:rgba(255,255,255,0.4)'}">

                </button>`:''}
                ${granted&&hasQuiz?`<button onclick="toggleQuizLock('${id}',${l.order})" style="padding:5px;border-radius:8px;font-size:10px;font-weight:700;cursor:pointer;border:1px solid;transition:all .15s;${qLk?'background:rgba(139,92,246,0.14);border-color:rgba(139,92,246,0.32);color:#c4b5fd':'background:rgba(255,255,255,0.07);border-color:rgba(255,255,255,0.15);color:rgba(255,255,255,0.4)'}">

                </button>`:''}
              </div>
            </div>`;

        </div>
      </div>`).join('')}

    <div style="display:flex;justify-content:flex-end;margin-top:8px">
      ${glassBtn('Done',`navigate('admin',{tab:'students'})`,'brand')}

  window.extendValidity=(sid,days)=>{const st=loadStudents();const base=st[sid].validUntil?new Date(st[sid].validUntil):new Date();if(base<new Date())base.setTime(new Date().getTime());base.setDate(base.getDate()+Number(days));st[sid].validUntil=base.toISOString().slice(0,10);saveStudents(st);renderAdminStudent(sid);};
  window.setCustomValidity=(sid)=>{const val=document.getElementById('ext-date').value;if(!val)return;const st=loadStudents();st[sid].validUntil=val;saveStudents(st);renderAdminStudent(sid);};
  window.clearValidity=(sid)=>{const st=loadStudents();st[sid].validUntil=null;saveStudents(st);renderAdminStudent(sid);};
  window.toggleAccess=(sid,classOrder)=>{const st=loadStudents();const list=new Set(st[sid].accessList||[]);list.has(classOrder)?list.delete(classOrder):list.add(classOrder);st[sid].accessList=[...list];saveStudents(st);renderAdminStudent(sid);};
  window.toggleVideoLock=(sid,classOrder)=>{const lk=new Set(getLockedVideos(sid));lk.has(classOrder)?lk.delete(classOrder):lk.add(classOrder);saveLockedVideos(sid,[...lk]);renderAdminStudent(sid);};
  window.toggleQuizLock=(sid,classOrder)=>{const lk=new Set(getLockedQuizzes(sid));lk.has(classOrder)?lk.delete(classOrder):lk.add(classOrder);saveLockedQuizzes(sid,[...lk]);renderAdminStudent(sid);};
  window.grantAll=(sid)=>{const st=loadStudents();st[sid].accessList=ALL_LESSONS.map(l=>l.order);saveStudents(st);renderAdminStudent(sid);};
  window.revokeAll=(sid)=>{const st=loadStudents();st[sid].accessList=[];saveStudents(st);renderAdminStudent(sid);};
  window.grantSection=(sid,secId)=>{const st=loadStudents();const orders=SECTIONS.find(s=>s.id===secId).lessons.map(l=>l.order);const list=new Set(st[sid].accessList||[]);orders.forEach(o=>list.add(o));st[sid].accessList=[...list];saveStudents(st);renderAdminStudent(sid);};
  window.revokeSection=(sid,secId)=>{const st=loadStudents();const orders=SECTIONS.find(s=>s.id===secId).lessons.map(l=>l.order);const list=new Set(st[sid].accessList||[]);orders.forEach(o=>list.delete(o));st[sid].accessList=[...list];saveStudents(st);renderAdminStudent(sid);};
}

    <!-- ACCENT JOURNEY -->
    <div style="margin-bottom:28px">
      <div style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;font-family:JetBrains Mono,monospace">ACCENT JOURNEY — 20 Classes</div>

    </div>

    <!-- WORD VAULT -->
    <div style="margin-bottom:28px">
      <div style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;font-family:JetBrains Mono,monospace">WORD VAULT — 10 Classes</div>
      <div class="lg" style="overflow:hidden;border-radius:16px">${wvRows}</div>
    </div>
  </div>`;

  // Save URL helper
  window.saveImgUrl=function(order){
    var inp=document.getElementById('img-url-'+order);
    if(!inp) return;
    var url=inp.value.trim();
    var vids=loadVideos();
    if(!vids[order]) vids[order]={};
    vids[order].thumb=url;
    saveVideos(vids);
    // Flash feedback
    var btn=inp.nextElementSibling;
    if(btn){var orig=btn.textContent;btn.textContent='✓ Saved';btn.style.background='rgba(34,197,94,.8)';setTimeout(function(){btn.textContent=orig;btn.style.background='var(--grad)';},1500);}
    // Refresh preview
    var preview=inp.closest('div[style*="display:flex"]').previousElementSibling;
    if(preview){
      var img=preview.querySelector('img');
      if(img){img.src=url;}
      else if(url){preview.innerHTML='<img src="'+url+'" style="width:100%;height:100%;object-fit:cover"/><div style="position:absolute;top:4px;left:5px;font-size:9px;font-weight:700;font-family:JetBrains Mono,monospace;color:rgba(255,255,255,.7);background:rgba(0,0,0,.6);padding:2px 5px;border-radius:4px">'+preview.querySelector('div[style*="position:absolute"]').textContent+'</div>';}
    }
  };

  // File upload — upload to Imgur anonymously, get URL back
  window.handleImgUpload=async function(evt,order){
    var file=evt.target.files[0];
    if(!file) return;
    var label=evt.target.closest('label');
    if(label){label.textContent='⏳ Uploading…';label.style.color='var(--g3)';}

    try{
      // Convert to base64 for Imgur API
      var base64=await new Promise(function(res,rej){
        var r=new FileReader();
        r.onload=function(e){res(e.target.result.split(',')[1]);};
        r.onerror=rej;
        r.readAsDataURL(file);
      });

      // Upload to Imgur (anonymous, no login needed)
      var resp=await fetch('https://api.imgur.com/3/image',{
        method:'POST',
        headers:{
          'Authorization':'Client-ID 546c25a59c58ad7',  // public Imgur client ID
          'Content-Type':'application/json'
        },
        body:JSON.stringify({image:base64,type:'base64'})
      });
      var data=await resp.json();

      if(data.success&&data.data&&data.data.link){
        var url=data.data.link;
        var inp=document.getElementById('img-url-'+order);
        if(inp){inp.value=url;}
        saveImgUrl(order);
        if(label){label.innerHTML='📁 Upload<input type="file" accept="image/*" style="display:none" onchange="handleImgUpload(event,'+order+')"/>';label.style.color='var(--muted)';}
      } else {
        throw new Error(data.data&&data.data.error||'Upload failed');
      }
    }catch(e){
      console.error('Imgur upload error:',e);
      // Fallback: save as base64 directly
      var r2=new FileReader();
      r2.onload=function(ev){
        var inp=document.getElementById('img-url-'+order);
        if(inp){inp.value=ev.target.result;saveImgUrl(order);}
        if(label){label.innerHTML='📁 Upload<input type="file" accept="image/*" style="display:none" onchange="handleImgUpload(event,'+order+')"/>';label.style.color='var(--muted)';}
      };
      r2.readAsDataURL(file);
      alert('Imgur upload failed - saved as local image. Error: '+e.message);
    }
  };
}

  window.exportData=()=>{
    const students=loadStudents();

    Object.keys(students).forEach(sid=>{progressData[sid]=[...loadProgress(sid)];});
    const data={students,videos:loadVideos(),progress:progressData};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);

  window.importDataPrompt=()=>document.getElementById('import-file').click();

    const file=e.target.files[0];if(!file)return;

function renderDashboard(){
  if(!currentSession||currentSession.role!=="student"){navigate("login");return;}
  const student=loadStudents()[currentSession.studentId];
  if(!student){currentSession=null;navigate("login");return;}

  const{expired}=getValidity(student);
  if(expired){
    currentSession=null;
    app.innerHTML='<div style="min-height:100vh;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:24px"><div style="text-align:center;max-width:340px"><h2 style="font-family:Montserrat,sans-serif;font-weight:800;font-size:20px;color:#fff;margin-bottom:8px">Access Expired</h2><p style="color:var(--muted);font-size:13px;margin-bottom:24px;line-height:1.6">Your course validity has ended.</p><button onclick="navigate(\'login\')" class="btn-primary" style="width:auto;padding:10px 24px">Back to Login</button></div></div>';
    return;
  }

  const logoutAt=localStorage.getItem("brokeneng_logout_"+student.id);
  if(logoutAt&&Date.now()>Number(logoutAt)){localStorage.removeItem("brokeneng_logout_"+student.id);currentSession=null;navigate("login");return;}

  const completedCount=ALL_LESSONS.filter(l=>isCompleted(l.id)).length;
  const unlockedCount=ALL_LESSONS.filter(isUnlocked).length;
  const pct=Math.round(completedCount/ALL_LESSONS.length*100);
  const quizScores=ALL_LESSONS.filter(l=>hasRealQuiz(l)&&isCompleted(l.id)).length;
  const xpTotal=completedCount>0?completedCount*100+quizScores*75:0;
  const vsArc=163.4*(1-pct/100);

  activeLesson=ALL_LESSONS.find(l=>isUnlocked(l)&&!isCompleted(l.id))||ALL_LESSONS.find(l=>isUnlocked(l))||ALL_LESSONS[0];
  const nextLesson=activeLesson;

  const days=['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'];
  const months=['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE','JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];
  const now=new Date();
  const dateStr=days[now.getDay()]+' · '+months[now.getMonth()]+' '+now.getFullYear();
  const hr=now.getHours();
  const greet=hr<12?'Good morning':hr<17?'Good afternoon':'Good evening';

  // Journey dots — section a only (20 lessons)
  const journeyLessons=SECTIONS[0]?SECTIONS[0].lessons:ALL_LESSONS.slice(0,20);
  var dots='';
  journeyLessons.forEach(function(l,i){
    var done=isCompleted(l.id);
    var unlocked=isUnlocked(l);
    var isCur=!done&&unlocked;
    var cls=done?'done':isCur?'current':'locked';
    var isLast=i===journeyLessons.length-1;
    dots+='<div class="jd-item"'+(unlocked?' onclick="navigate(\'lesson\',{id:\''+l.id+'\'})"':'')+'>'+
      '<div class="jd-dot '+cls+'">'+(done?'✓':l.order)+'</div>'+
      '<div class="jd-num">D'+String(l.order).padStart(2,'0')+'</div>'+
      '</div>'+
      (!isLast?'<div class="jd-line '+(done?'done':'')+'"></div>':'');
  });

  // Phase cards

// Extract YouTube video ID from any YouTube URL format
function getYouTubeId(url){
  if(!url)return null;
  const patterns=[
    /youtu\.be\/([^?&\s]+)/,
    /youtube\.com\/watch\?v=([^&\s]+)/,
    /youtube\.com\/embed\/([^?&\s]+)/,
    /youtube\.com\/v\/([^?&\s]+)/,
    /youtube\.com\/shorts\/([^?&\s]+)/,
  ];
  for(const p of patterns){const m=url.match(p);if(m)return m[1];}
  return null;
}

// Convert any Bunny.net URL to embed format
function getBunnyEmbedUrl(url){
  if(!url)return null;
  if(!url.includes('mediadelivery.net'))return null;
  // Extract library ID and video ID from any Bunny URL format
  const m=url.match(/\/(\d+)\/([a-f0-9-]{36})/i);
  if(m){
    // Use iframe.mediadelivery.net with required params
    return`https://iframe.mediadelivery.net/embed/${m[1]}/${m[2]}?autoplay=false&loop=false&muted=false&preload=true&responsive=true`;
  }
  return null;
}

function setupPlayer(lesson,student){try{
  const wrapper=document.getElementById("player-wrapper");
  const videoMeta=loadVideos()[lesson.order]||{};
  const realSrc=videoMeta.src||SAMPLE_VIDEO;

  // If YouTube or Bunny.net — iframe handles playback, watermark overlay handles protection
  if(getYouTubeId(realSrc)||getBunnyEmbedUrl(realSrc)){
    wrapper.addEventListener("contextmenu",e=>e.preventDefault());
    return;
  }

  const video=document.getElementById("video");
  const source=document.getElementById("video-source");
  if(!video||!source)return;

  if(!source.src||source.src===window.location.href){
    source.src=realSrc;
    video.load();
  }

  wrapper.addEventListener("contextmenu",e=>e.preventDefault());
  video.addEventListener("dragstart",e=>e.preventDefault());

  const qualitySrcs=realSrc!==SAMPLE_VIDEO
    ?[{label:"1080p",src:realSrc},{label:"720p",src:realSrc},{label:"480p",src:realSrc}]
    :QUALITIES;

  const qBtns=document.getElementById("quality-buttons");
  if(qBtns){
    qBtns.innerHTML=qualitySrcs.map((q,i)=>
      `<button data-i="${i}" class="qbtn" style="border-radius:12px;padding:2px 8px;font-size:10px;border:none;cursor:pointer;font-weight:600;${i===0?'background:var(--grad);color:#fff':'background:rgba(255,255,255,.1);color:rgba(255,255,255,.7)'}">${q.label}</button>`
    ).join("");
    let qi=0;
    qBtns.querySelectorAll(".qbtn").forEach(btn=>{
      btn.addEventListener("click",()=>{
        const i=Number(btn.dataset.i);if(i===qi)return;
        const t=video.currentTime,playing=!video.paused;
        qi=i;source.src=qualitySrcs[i].src;video.load();video.currentTime=t;
        if(playing)video.play().catch(()=>{});
        qBtns.querySelectorAll(".qbtn").forEach(b=>{
          b.style.cssText=`border-radius:12px;padding:2px 8px;font-size:10px;border:none;cursor:pointer;font-weight:600;${Number(b.dataset.i)===i?'background:var(--grad);color:#fff':'background:rgba(255,255,255,.1);color:rgba(255,255,255,.7)'}`;
        });
      });
    });
  }

  const fsBtn=document.getElementById("fullscreen-btn");
  if(fsBtn){
    fsBtn.addEventListener("click",()=>{document.fullscreenElement?document.exitFullscreen():wrapper.requestFullscreen?.().catch(()=>{});});
    document.addEventListener("fullscreenchange",()=>{fsBtn.textContent=document.fullscreenElement?"Exit ⛶":"⛶";});
  }

  // ── FORENSIC WATERMARK ──────────────────────────────────────────────────────
  // Floats over entire video — visible on any screen recording or phone camera
  const wmContainer = document.getElementById("wm-container");
  const wm1 = document.getElementById("wm-1");
  const wm2 = document.getElementById("wm-2");
  const wmCorner = document.getElementById("wm-corner");

  if(wm1 && wm2 && wmCorner && wmContainer){
    const wmText = `${student.name}  •  ${student.email}`;
    const wmShort = student.email;

    // Update corner stamp every second with time
    function updateCorner(){
      const now = new Date();
      wmCorner.innerHTML = `${wmShort}<br>${now.toLocaleDateString()} ${now.toLocaleTimeString()}`;
    }
    updateCorner();
    setInterval(updateCorner, 1000);

    // Slowly drift watermarks across the screen like Hotstar/Netflix
    let pos1 = {x:15, y:20};
    let pos2 = {x:55, y:65};
    let vel1 = {x:0.04, y:0.025};
    let vel2 = {x:-0.035, y:0.04};

    function moveWatermarks(){
      const W = wmContainer.offsetWidth || 640;
      const H = wmContainer.offsetHeight || 360;
      const wPct = 35; // approx width % of watermark text
      const hPct = 6;

      // Move
      pos1.x += vel1.x; pos1.y += vel1.y;
      pos2.x += vel2.x; pos2.y += vel2.y;

      // Bounce off edges
      if(pos1.x <= 0 || pos1.x >= (100-wPct)) vel1.x *= -1;
      if(pos1.y <= 0 || pos1.y >= (100-hPct)) vel1.y *= -1;
      if(pos2.x <= 0 || pos2.x >= (100-wPct)) vel2.x *= -1;
      if(pos2.y <= 0 || pos2.y >= (100-hPct)) vel2.y *= -1;

      // Apply positions
      wm1.style.left = pos1.x + '%';
      wm1.style.top  = pos1.y + '%';
      wm2.style.left = pos2.x + '%';
      wm2.style.top  = pos2.y + '%';

      requestAnimationFrame(moveWatermarks);
    }

    // Set text
    wm1.textContent = wmText;
    wm2.textContent = wmText;

    // Randomise starting positions
    pos1 = {x: 10 + Math.random()*40, y: 10 + Math.random()*30};
    pos2 = {x: 40 + Math.random()*40, y: 50 + Math.random()*30};

    moveWatermarks();
  }

  const markBtn=document.getElementById("mark-complete-btn");
  markBtn.disabled=isCompleted(lesson.id);
  function markComplete(){
    if(isCompleted(lesson.id))return;
    markLessonComplete(lesson.id); 
    markBtn.disabled=true;
    markBtn.innerHTML=`<svg style="width:16px;height:16px" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg> Completed`;
    markBtn.className="shrink-0 flex items-center gap-2 rounded-xl px-4 py-2 text-sm font-semibold bg-green-50 text-green-600 border border-green-200 cursor-default transition";
    renderQuizCta(lesson, true);

    if(currentSession?.role==="student"){
      const students=loadStudents();
      const s=students[currentSession.studentId];
      if(s){
        const unlocked=ALL_LESSONS.filter(l=>isUnlocked(l));
        const allDone=unlocked.every(l=>isCompleted(l.id));
        if(allDone&&unlocked.length>0){
          if(!s.completedAt){
            s.completedAt=new Date().toISOString();
            students[s.id].completedAt=s.completedAt;
            saveStudents(students);
          }
          const banner=document.createElement("div");
          banner.className="fixed inset-x-0 top-16 z-50 mx-4 rounded-2xl bg-green-50 border border-green-200 shadow-xl p-5 flex items-center gap-4";
          banner.innerHTML=`<svg class="w-8 h-8 text-green-500 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            <div class="flex-1 min-w-0">
              <p class="font-display font-bold text-green-800">Course Complete!</p>
              <p class="text-xs text-green-600 mt-0.5">Congratulations! You will be automatically logged out after 24 hours.</p>
            </div>
            <button onclick="this.parentElement.remove()" class="text-green-400 hover:text-green-600 shrink-0 text-xl leading-none">&#215;</button>`;
          document.body.appendChild(banner);
          if(!localStorage.getItem("brokeneng_logout_"+s.id)){
            localStorage.setItem("brokeneng_logout_"+s.id,String(Date.now()+24*60*60*1000));
          }
        }
      }
    }
  }
  video.addEventListener("ended",markComplete);
  markBtn.addEventListener("click",markComplete);
}catch(e){console.warn("setupPlayer error:",e);}}

  if(!lesson||!isCompleted(lesson.id)){navigate("lesson",{id:lessonId});return;}
  if(currentSession?.role==="student"){

      navigate("lesson",{id:lessonId});return;
    }
  }
  if(!currentSession||currentSession.role!=="student"){navigate("login");return;}
  const student=loadStudents()[currentSession.studentId];

  const QUESTIONS=getQuiz(lesson);
  const total=QUESTIONS.length;
  let current=0,correct=0,answered=false;

  app.innerHTML=sidebarHtml("")+`

      <h1 style="font-family:'Montserrat',sans-serif;font-weight:800;font-size:20px;color:#fff;margin-bottom:24px">Class Quiz</h1>

      <div class="mb-6">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <span id="q-counter" style="font-size:11px;font-weight:600;color:var(--muted);font-family:'JetBrains Mono',monospace"></span>
          <span id="q-score" style="font-size:11px;font-weight:600;color:var(--muted)"></span>
        </div>
        <div class="prog-bar" style="margin-bottom:16px"><div id="progress-fill" class="prog-fill" style="width:0%"></div></div>

    const q=QUESTIONS[idx];
    document.getElementById("question-slot").innerHTML=`
      <div class="glass-white" style="border-radius:16px;padding:24px">
        ${q.hint?`<div class="flex justify-end mb-3">
          <button onclick="const hb=document.getElementById('hint-box');hb.style.display=hb.style.display==='none'?'block':'none'" style="border-radius:20px;border:1px solid rgba(255,255,255,.15);padding:3px 10px;font-size:11px;color:var(--muted);background:none;cursor:pointer;transition:all .15s" onmouseover="this.style.borderColor='rgba(255,45,120,.3)';this.style.color='var(--g3)'" onmouseout="this.style.borderColor='rgba(255,255,255,.15)';this.style.color='var(--muted)'">Hint</button>
        </div>
        <div id="hint-box" style="display:none;margin-bottom:16px;border-radius:10px;background:rgba(240,88,37,.08);border:1px solid rgba(240,88,37,.2);padding:10px 14px;font-size:12px;color:var(--g3)">${q.hint}</div>`:""}

              <span class="leading-snug">${opt}</span>
            </button>`).join("")}
        </div>
        <div id="feedback-box" class="hidden mt-4"></div>
        <div id="next-wrap" class="hidden mt-5">
          <button onclick="nextQuestion()" style="width:100%;background:var(--grad);color:#fff;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(255,45,120,.35);font-family:'Montserrat',sans-serif">
            ${idx<total-1?"Next Question →":"See Results"}
          </button>
        </div>
      </div>`;

    updateProgress();

    window.pickAnswer=(oi)=>{
      if(answered)return;answered=true;
      const isCorrect=oi===q.answer;if(isCorrect)correct++;
      q.options.forEach((_,i)=>{
        const btn=document.getElementById("opt-"+i);btn.disabled=true;
        if(i===q.answer){btn.classList.add("correct");btn.querySelector("span:first-child").style.cssText="display:flex;width:30px;height:30px;flex-shrink:0;align-items:center;justify-content:center;border-radius:50%;border:1.5px solid rgba(34,197,94,.5);background:rgba(34,197,94,.2);font-weight:600;font-size:11px;color:#4ade80;font-family:'JetBrains Mono',monospace";}

    var ringStyle=passed?"background:rgba(34,197,94,.1);border:3px solid rgba(34,197,94,.3)":"background:rgba(255,45,120,.1);border:3px solid rgba(255,45,120,.3)";
    var scoreCol=passed?"color:#4ade80":"color:var(--g1)";
    var html='<div class="lg" style="padding:32px;text-align:center">'
      +'<div style="width:72px;height:72px;border-radius:50%;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;'+ringStyle+'">'
      +'<p style="font-family:JetBrains Mono,monospace;font-weight:700;font-size:20px;'+scoreCol+'">'+score+'%</p></div>'
      +'<p style="font-family:Montserrat,sans-serif;font-weight:800;font-size:20px;color:#fff;margin-bottom:4px">'+(passed?'Passed!':'Not quite')+'</p>'
      +'<p style="color:var(--muted);font-size:13px;margin-bottom:24px">'+correct+' of '+total+' correct - pass mark 70%</p>'
      +'<div style="display:flex;justify-content:center;gap:32px;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid rgba(255,255,255,.08)">'
        +'<div style="text-align:center"><p style="font-family:JetBrains Mono,monospace;font-weight:700;font-size:24px;color:#4ade80">'+correct+'</p><p style="font-size:10px;font-weight:600;text-transform:uppercase;color:var(--muted);margin-top:4px">Correct</p></div>'
        +'<div style="width:1px;background:rgba(255,255,255,.1)"></div>'
        +'<div style="text-align:center"><p style="font-family:JetBrains Mono,monospace;font-weight:700;font-size:24px;color:var(--g1)">'+(total-correct)+'</p><p style="font-size:10px;font-weight:600;text-transform:uppercase;color:var(--muted);margin-top:4px">Wrong</p></div>'
      +'</div>'
      +'<div style="display:flex;flex-direction:column;align-items:center;gap:10px">'
        +(!passed?'<button id="retake-btn" style="width:100%;max-width:240px;background:var(--grad);color:#fff;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:Montserrat,sans-serif">Retake Quiz</button>':'')
        +'<button id="dash-btn" style="font-size:13px;color:var(--muted);background:none;border:none;cursor:pointer">Back to Dashboard</button>'
      +'</div></div>';
    document.getElementById("question-slot").innerHTML=html;
    var rb=document.getElementById("retake-btn");
    if(rb) rb.addEventListener("click",function(){navigate("quiz",{lessonId:lessonId});});
    var db=document.getElementById("dash-btn");
    if(db) db.addEventListener("click",function(){navigate("dashboard");});
  }

  showQuestion(0);
}

// ─── BOOT ─────────────────────────────────────────────────────────────────────
function setupTopBar(student){
  // Show mobile menu button on small screens
  const btn = document.getElementById("mob-menu-btn");
  if(btn) btn.style.display = window.innerWidth < 768 ? "flex" : "none";
  window.addEventListener("resize", ()=>{
    const b = document.getElementById("mob-menu-btn");
    if(b) b.style.display = window.innerWidth < 768 ? "flex" : "none";
  }, {once:true});
}

navigate("login");
</script>
